intro:
  en: "Yun Hong is a B.S. candidate in Computer Science at Fudan University and a former exchange student at The University of Texas at Austin. Research interests include machine learning, robotics, autonomous driving, and risk-aware decision systems."
  zh: "洪运，复旦大学计算机科学技术本科生，曾在德克萨斯大学奥斯汀分校交换学习。研究兴趣聚焦于机器学习、机器人学、自动驾驶与风险感知决策。"

education:
  - institution_en: "Fudan University (FDU)"
    institution_zh: "复旦大学（FDU）"
    location_en: "Shanghai, China"
    location_zh: "中国上海"
    degree_en: "B.S. Candidate in Computer Science"
    degree_zh: "计算机科学技术本科生"
    period_en: "Sep 2023 - Present"
    period_zh: "2023年9月 - 至今"
    highlights:
      - en: "Completed risk-map research for autonomous driving at MagicLab under Wenchao Ding; the work is accepted by IEEE Robotics and Automation Letters (RA-L)."
        zh: "在丁文超指导下完成自动驾驶风险地图研究，成果已被 IEEE Robotics and Automation Letters (RA-L) 接收。"

  - institution_en: "The University of Texas at Austin (UTA)"
    institution_zh: "德克萨斯大学奥斯汀分校（UTA）"
    location_en: "Austin, Texas, USA"
    location_zh: "美国德州奥斯汀"
    degree_en: "Exchange Student in Computer Science"
    degree_zh: "计算机科学交换生"
    period_en: "Aug 2025 - Dec 2025"
    period_zh: "2025年8月 - 2025年12月"
    highlights:
      - en: "Completed multi-task active perception research for robotic information gathering under Junhong Xu and contributed to benchmark design and policy evaluation."
        zh: "在 Junhong Xu 指导下开展多任务机器人主动感知研究，参与基准构建与策略评测。"

skills:
  - en: "Machine Learning: Supervised and unsupervised learning, reinforcement learning, imitation learning, model evaluation and generalization."
    zh: "机器学习：监督学习、无监督学习、强化学习、模仿学习，以及模型评估与泛化。"
  - en: "Deep Learning: CNN/RNN/LSTM, diffusion models, spatiotemporal modeling, and PyTorch-based model design, training, and fine-tuning."
    zh: "深度学习：CNN/RNN/LSTM、扩散模型、时空建模，熟练使用 PyTorch 进行建模、训练和微调。"
  - en: "LLM and Vision-Language: LLaMA series fine-tuning, VLA models, reasoning and reflection mechanism design."
    zh: "大模型与视觉语言：LLaMA 系列微调、VLA 模型、推理与反思机制设计。"
  - en: "Robotics and Perception: Active perception, multi-task POMDP, information gathering, long-horizon manipulation."
    zh: "机器人与感知：主动感知、多任务 POMDP、信息采集与长时程操作。"
  - en: "Autonomous Driving: Motion planning, trajectory prediction, decision-making, and risk-field modeling."
    zh: "自动驾驶：运动规划、轨迹预测、决策与风险场建模。"
  - en: "Programming and Languages: C, C++, Python, LaTeX; native Chinese and fluent English."
    zh: "编程与语言：C、C++、Python、LaTeX；中文母语，英语流利。"

research:
  - title_en: "Multi-Task Active Perception for Robotic Information Gathering"
    title_zh: "多任务机器人信息采集中的主动感知研究"
    role_en: "Research Assistant, UT Austin (Advisor: Junhong Xu)"
    role_zh: "研究助理，UT Austin（导师：Junhong Xu）"
    location_en: "Austin, TX, USA"
    location_zh: "美国奥斯汀"
    period_en: "Sep 2025 - Dec 2025"
    period_zh: "2025年9月 - 2025年12月"
    bullets:
      - en: "Built multi-task partially observable simulation benchmarks with unknown object properties and unknown spatial locations."
        zh: "构建多任务部分可观测仿真基准，覆盖物体属性未知与空间位置未知两类核心设置。"
      - en: "Implemented and compared imitation learning, reinforcement learning, and IL-pretrain plus RL-finetune paradigms on fine-tuned VLAs."
        zh: "实现并比较模仿学习、强化学习以及 IL 预训练加 RL 微调三类训练范式。"
      - en: "Reviewed and analyzed prior work on manipulation exploration, IL-RL hybrid policies, and long-horizon POMDP benchmarks."
        zh: "系统梳理机器人探索、IL-RL 混合策略与长时程 POMDP 基准相关研究。"

  - title_en: "Learning Risk Map for Autonomous Driving in Partially Observable Environments"
    title_zh: "部分可观测环境下的自动驾驶风险地图学习"
    role_en: "Accepted by IEEE Robotics and Automation Letters (RA-L)"
    role_zh: "成果已被 IEEE Robotics and Automation Letters (RA-L) 接收"
    location_en: "Shanghai, China"
    location_zh: "中国上海"
    period_en: "Oct 2024 - May 2025"
    period_zh: "2024年10月 - 2025年5月"
    bullets:
      - en: "Engineered risk field representations with advanced spatiotemporal modeling techniques."
        zh: "使用先进时空建模技术构建风险场表示。"
      - en: "Developed realistic traffic-scene generation using diffusion models and gradient optimization."
        zh: "结合扩散模型与梯度优化，生成更真实的交通场景。"
      - en: "Designed a lightweight neural network for efficient risk prediction."
        zh: "设计轻量级神经网络，实现高效风险预测。"

  - title_en: "Research on ChatGPT-o1 Reproduction and Reflection Ability Improvement"
    title_zh: "ChatGPT-o1 复现与反思能力提升研究"
    role_en: "Research Assistant, Fudan NLP Group (Advisor: Xuanjing Huang)"
    role_zh: "研究助理，复旦 NLP 实验室（导师：黄萱菁）"
    location_en: "Shanghai, China"
    location_zh: "中国上海"
    period_en: "Sep 2024 - Jun 2025"
    period_zh: "2024年9月 - 2025年6月"
    bullets:
      - en: "Constructed, evaluated, and optimized reflection datasets to improve model reasoning in complex tasks."
        zh: "构建、评测并优化反思数据集，提升模型在复杂任务中的推理能力。"
      - en: "Synthesized self-critic data based on Llama3.1-8b-instruct and generated diverse error-to-correct reflection trajectories."
        zh: "基于 Llama3.1-8b-instruct 合成 self-critic 数据，生成多样化由错到对的反思轨迹。"
      - en: "Applied tree-search and reverse-reasoning strategies and evaluated methods with GSM8K."
        zh: "采用树搜索与逆向推理策略，并在 GSM8K 上评估不同方法。"

internships:
  - company_en: "ByteDance (Douyin R&D, Live Streaming and Media Stream)"
    company_zh: "字节跳动（抖音研发，直播与媒体流方向）"
    role_en: "Test Development Engineer Intern"
    role_zh: "测试开发实习生"
    location_en: "Shanghai, China"
    location_zh: "中国上海"
    period_en: "Jan 2026 - Present"
    period_zh: "2026年1月 - 至今"
    bullets:
      - en: "Refactored and expanded internal inspection and test cases, improving accuracy from 89% to 100% and coverage from 95% to 98%."
        zh: "重构并扩展内部巡检与测试用例，将准确率从 89% 提升到 100%，覆盖率从 95% 提升到 98%。"
      - en: "Developing an LLM-powered efficiency tool for automated QA workflows."
        zh: "正在开发基于大模型的自动化测试效能工具。"

projects:
  - name_en: "LCDP-Sim: Language-Conditioned Diffusion Policy"
    name_zh: "LCDP-Sim：基于语言条件的扩散策略"
    link: "https://github.com/16yunH/LCDP-Sim"
    role_en: "Independent Developer"
    role_zh: "独立开发者"
    location_en: "Austin, Texas"
    location_zh: "美国奥斯汀"
    period_en: "Dec 2025 - Present"
    period_zh: "2025年12月 - 至今"
    bullets:
      - en: "Built an end-to-end Vision-Language-Action system using diffusion policy for robotic control."
        zh: "构建端到端视觉-语言-动作系统，基于 Diffusion Policy 生成机械臂控制信号。"
      - en: "Integrated CLIP encoder and U-Net DDPM/DDIM architecture for high-fidelity action generation."
        zh: "集成 CLIP 编码器与 U-Net DDPM/DDIM 架构，实现高保真动作生成。"
      - en: "Implemented 16-step action chunking and a full ManiSkill2 data-train-eval pipeline."
        zh: "实现 16 步动作分块，并在 ManiSkill2 上搭建完整的数据-训练-评估闭环。"

  - name_en: "MapNavigation"
    name_zh: "MapNavigation"
    link: "https://github.com/16yunH/MapNavigation"
    role_en: "Independent Developer"
    role_zh: "独立开发者"
    location_en: "Shanghai, China"
    location_zh: "中国上海"
    period_en: "Dec 2024 - Present"
    period_zh: "2024年12月 - 至今"
    bullets:
      - en: "Combined OpenStreetMap with Gaode Maps API for route planning and location search."
        zh: "融合 OpenStreetMap 与高德地图 API，实现路径规划与地点搜索。"
      - en: "Implemented hybrid point selection, detailed route display, and multi-road-type support with speed constraints."
        zh: "实现混合选点、路线细节展示与多道路类型速度约束支持。"

  - name_en: "NeuralStyle: A Modular Neural Style Transfer Project"
    name_zh: "NeuralStyle：模块化神经风格迁移项目"
    link: "https://github.com/16yunH/NeuralStyle"
    role_en: "Independent Developer"
    role_zh: "独立开发者"
    location_en: "Shanghai, China"
    location_zh: "中国上海"
    period_en: "Jun 2025 - Present"
    period_zh: "2025年6月 - 至今"
    bullets:
      - en: "Developed a modular Python toolkit for neural style transfer with strong maintainability and extensibility."
        zh: "开发模块化 Python 神经风格迁移工具箱，具备良好的可维护性与可扩展性。"
      - en: "Built batch processing and a configurable training pipeline for reproducible experiments."
        zh: "实现批量处理与可配置管线，支持可复现实验。"
      - en: "Provided an interactive web interface for in-browser stylization."
        zh: "提供可在浏览器中完成风格化生成的交互式 Web 界面。"

