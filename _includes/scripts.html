<script>
    var userPref = window.matchMedia ? window.matchMedia.bind(window) : null;
    window.userPref = userPref;
</script>
<script type="module" src="{{ base_path }}/assets/js/main.min.js"></script>

<script>
    (function () {
        var media = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;

        function getStoredTheme() {
            var t = localStorage.getItem('theme');
            return (t === 'dark' || t === 'light') ? t : null;
        }

        function getComputedTheme() {
            var stored = getStoredTheme();
            if (stored) return stored;
            return (media && media.matches) ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            var html = document.documentElement;
            var icon = document.getElementById('theme-icon');
            if (theme === 'dark') {
                html.setAttribute('data-theme', 'dark');
                if (icon) {
                    icon.classList.remove('fa-sun');
                    icon.classList.add('fa-moon');
                }
            } else {
                html.removeAttribute('data-theme');
                if (icon) {
                    icon.classList.remove('fa-moon');
                    icon.classList.add('fa-sun');
                }
            }
        }

        function toggleTheme() {
            var current = getComputedTheme();
            var next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }

        document.addEventListener('DOMContentLoaded', function () {
            applyTheme(getComputedTheme());

            var toggle = document.getElementById('theme-toggle');
            if (toggle) {
                toggle.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopImmediatePropagation();
                    toggleTheme();
                }, true);
            }

            if (media) {
                media.addEventListener('change', function (e) {
                    if (!getStoredTheme()) {
                        applyTheme(e.matches ? 'dark' : 'light');
                    }
                });
            }
        });
    })();
</script>
